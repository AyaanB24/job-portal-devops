version: '3.8'

services:
  # Database Service
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password123
    networks:
      - jobportal_network

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://admin:password123@mongodb:27017/jobportal?authSource=admin
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost
    depends_on:
      - mongodb
    networks:
      - jobportal_network

  # Frontend & Nginx Static Hosting Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - jobportal_network

networks:
  jobportal_network:
    driver: bridge

volumes:
  mongodb_data:
